name: Deploy to GitHub Pages

on:
  push:
    branches: [main, UpdateV2, UpdateV4, V5]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 traz o npm 11, que gerou o package-lock.json. O npm 10
          # (Node 20) resolve os peers do vite 7 — arrastado pelo vitest 4 —
          # de forma diferente e rejeita o lock no `npm ci` (esbuild ausente).
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
